name: Deploy Pygame to Web

on:
  push:
    branches: [ "main" ] # Sửa thành "master" nếu nhánh chính của bạn tên là master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pygame-script (pygbag)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygbag

      - name: Build Web Version
        run: |
          # Chạy pygbag trực tiếp để đóng gói file main.py
          python -m pygbag --build ./main.py

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Chỉ định chính xác thư mục chứa index.html sau khi build xong
          path: 'build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
